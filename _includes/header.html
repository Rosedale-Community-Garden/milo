 <header role="banner">
    <nav class="navbar navbar-expand-md navbar-light bg-white absolute-top">
      <div class="container">

        <button class="navbar-toggler order-2 order-md-1" type="button" data-toggle="collapse" data-target="#navbar" aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse order-3 order-md-2" id="navbar">

          <ul class="navbar-nav mr-auto">

            {% for link in site.main_toc %}
              {% if link.children %}
                <li class="nav-item dropdown">
                  <a class="nav-link dropdown-toggle" href="#" id="dropdown-{{ link.title | slugify }}" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    {{ link.title }}
                  </a>
                  <div class="dropdown-menu" aria-labelledby="dropdown-{{ link.title | slugify }}">
                    {% for child in link.children %}
                      <a class="dropdown-item" href="{{ site.baseurl }}/{{ child.url }}">{{ child.title }}</a>
                    {% endfor %}
                  </div>
                </li>
              {% else %}
                <li class="nav-item">
                  <a class="nav-link" href="{{ site.baseurl }}/{{ link.url }}">{{ link.title }}</a>
                </li>
              {% endif %}
            {% endfor %}

          </ul>

        </div>

        <a class="navbar-brand mx-auto order-1 order-md-3" href="{{site.baseurl}}">{{ site.title }}</a>
      </div>
    </nav>
  </header>
